kind = "web"
previewPath = "/"
title = "IMPACCT Portal"
version = "1.0.0"
id = "artifacts/portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25265
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/portal run dev"

[services.env]
PORT = "25265"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/portal", "run", "build"]
publicDir = "artifacts/portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
